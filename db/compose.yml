version: "3.9"

services:
  postgres_15_app:
    image: postgres:15
    container_name: postgres_15_app
    ports:
      - "5435:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg15_app_data:/var/lib/postgresql/data

volumes:
  pg15_app_data: